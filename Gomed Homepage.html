  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

><span>Careers<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.06); display: flex; justify-content: space-between; align-items: center;\">\n      <div style=\"font-family: 'Source Sans 3', sans-serif; font-size: 12px; color: rgba(255,255,255,0.25);\">© 2026 Gomed Health Pvt. Ltd. All rights reserved.<\u002Fdiv>\n      <div style=\"display: flex; gap: 20px; font-family: 'Source Sans 3', sans-serif; font-size: 12px; color: rgba(255,255,255,0.25);\">\n        <span>Privacy Policy<\u002Fspan><span>Terms of Service<\u002Fspan><span>Cookie Policy<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\n\nclass Component extends DCLogic {\n  state = { openFaq: 0 };\n\n  renderVals() {\n    const costComparisons = [\n      { name: \"Cardiac Bypass\", savings: \"94%\", indiaPrice: \"₹2.8L\", westPrice: \"₹1.2Cr\", barWidth: \"94%\" },\n      { name: \"Spinal Fusion\", savings: \"89%\", indiaPrice: \"₹3.2L\", westPrice: \"₹29L\", barWidth: \"89%\" },\n      { name: \"Dental Implants\", savings: \"83%\", indiaPrice: \"₹35K\", westPrice: \"₹2.1L\", barWidth: \"83%\" },\n      { name: \"Hip Replacement\", savings: \"82%\", indiaPrice: \"₹3.5L\", westPrice: \"₹19L\", barWidth: \"82%\" },\n      { name: \"Knee Replacement\", savings: \"82%\", indiaPrice: \"₹2.2L\", westPrice: \"₹12L\", barWidth: \"82%\" },\n      { name: \"IVF Cycle\", savings: \"79%\", indiaPrice: \"₹1.2L\", westPrice: \"₹5.8L\", barWidth: \"79%\" },\n    ];\n\n    const ayushSystems = [\n      { name: \"Ayurveda\", desc: \"Panchakarma & rejuvenation\", svgPath: '<path d=\"M12 2a7 7 0 00-7 7c0 3 2 5 2 8h10c0-3 2-5 2-8a7 7 0 00-7-7z\"><\u002Fpath><path d=\"M9 22h6\"><\u002Fpath>' },\n      { name: \"Yoga\", desc: \"Therapeutic & restorative\", svgPath: '<circle cx=\"12\" cy=\"5\" r=\"2\"><\u002Fcircle><path d=\"M12 7v6m0 0l-4 6m4-6l4 tay and up to 3 entries. Up to 2 medical attendants can accompany you.\" },\n      { q: \"Is my medical data safe on Gomed?\", a: \"Yes. All records are AES-256 encrypted, HIPAA-aligned, and GDPR-ready. Your data is shared only with the specialists reviewing your case, with your explicit consent.\" },\n      { q: \"Is there any upfront fee to use Gomed?\", a: \"AI analysis and hospital matching are completely free with no commitment. You only pay an upfront fee once you're satisfied with the doctor, hospital, and treatment proposal and choose to onboard.\" },\n    ];\n    const faqs = faqData.map((f, i) => {\n      const open = this.state.openFaq === i;\n      return {\n        q: f.q, a: f.a, open,\n        iconBg: open ? '#E07A5F' : '#FBF7F2',\n        iconStroke: open ? 'white' : '#E07A5F',\n        iconRotate: open ? 'rotate(45deg)' : 'rotate(0deg)',\n        onToggle: () => this.setState({ openFaq: open ? -1 : i }),\n      };\n    });\n\n    const treatments = [\n      { name: \"Cardiac Surgery\", desc: \"Bypass, valve replacement, angioplasty, pacemaker implants\", price: \"₹1.5L – ₹4.5L\", tag: \"Most Popular\", cities: \"Chennai · Mumbai · Delhi\" },\n      { name: \"Orthopedics\", desc: \"Joint replacement, spine surgery, sports medicine, arthroscopy\", price: \"₹1.2L – ₹3.5L\", tag: \"High Success\", cities: \"Delhi · Bengaluru · Mumbai\" },\n      { name: \"Oncology\", desc: \"Cancer treatment, immunotherapy, radiation, surgical oncology\", price: \"₹2L – ₹8L\", tag: \"Advanced Care\", cities: \"Mumbai · Chennai · Hyderabad\" },\n      { name: \"Fertility & IVF\", desc: \"IVF, IUI, egg freezing, fertility assessment, surrogacy support\", price: \"₹80K – ₹2.5L\", tag: \"Growing Demand\", cities: \"Mumbai · Delhi · Bengaluru\" },\n      { name: \"Cosmetic Surgery\", desc: \"Rhinoplasty, liposuction, hair transplant, facelifts\", price: \"₹50K – ₹3L\", tag: \"Trending\", cities: \"Mumbai · Delhi · Bengaluru\" },\n      { name: \"Ayurveda & Wellness\", desc: \"Panchakarma, yoga therapy, naturopathy, rejuvenation\", price: \"₹25K – ₹1.5L\", tag: \"Traditional\", cities: \"Kerala · Mysuru · Rishikesh\" },\n    ];\n\n    const stats = [\n      { value: \"500+\", label: \"Partner Hospitals\" },\n      { value: \"50+\", label: \"Cities Covered\" },\n      { value: \"200+\", label: \"Treatments Available\" },\n      { value: \"98%\", label: \"Patient Satisfaction\" },\n    ];\n\n    const steps = [\n      { num: \"1\", title: \"Tell us what you need\", desc: \"Share your condition and preferences. Our AI starts matching immediately.\" },\n      { num: \"2\", title: \"Get matched\", desc: \"Receive top 3 hospital recommendations with transparent pricing.\" },\n      { num: \"3\", title: \"Book your journey\", desc: \"Treatment, travel, and stay — bundled into one seamless package.\" },\n      { num: \"4\", title: \"Travel with confidence\", desc: \"Dedicated coordinator guides you from arrival through recovery.\" },\n    ];\n\n    const packages = [\n      { name: \"Cardiac Bypass\", location: \"Chennai · 7 nights\", includes: \"Surgery + recovery stay + airport transfers + teleconsult\", price: \"₹2.8L\", gradient: `url(${(window.__resources && window.__resources.pkgCardiac) || 'https://images.unsplash.com/photo-1586773860418-d37222d8fce3?w=600&h=300&fit=crop&q=80'}) center/cover no-repeat` },\n      { name: \"Knee Replacement\", location: \"Delhi · 5 nights\", includes: \"Surgery + physio sessions + hotel stay + local transport\", price: \"₹1.8L\", gradient: `url(${(window.__resources && window.__resources.pkgKnee) || 'https://images.unsplash.com/photo-1538108149393-fbbd81895907?w=600&h=300&fit=crop&q=80'}) center/cover no-repeat` },\n      { name: \"IVF Fertility\", location: \"Bengaluru · 10 days\", includes: \"Full IVF cycle + consultations + stay + wellness support\", price: \"₹1.2L\", gradient: `url(${(window.__resources && window.__resources.pkgIvf) || 'https://images.unsplash.com/photo-1579684385127-1ef15d508118?w=600&h=300&fit=crop&q=80'}) center/cover no-repeat` },\n    ];\n\n    const testimonials = [\n      { name: \"Rajesh Kumar\", initials: \"RK\", route: \"Jaipur → Chennai\", quote: \"\\\"Gomed handled everything — finding the surgeon, booking the hotel, even airport pickup. My bypass surgery cost half what I was quoted back home.\\\"\", treatment: \"Cardiac Bypass · Apollo Chennai\", avatarBg: \"#E0D5C8\", avatarColor: \"#8B7355\" },\n      { name: \"Priya Sharma\", initials: \"PS\", route: \"Lucknow → Bengaluru\", quote: \"\\\"After years of trying, our IVF journey succeeded at Manipal. Gomed made the entire process stress-free — from consultation to accommodation.\\\"\", treatment: \"IVF Treatment · Manipal Bengaluru\", avatarBg: \"#D4E6DC\", avatarColor: \"#4A8B6E\" },\n      { name: \"Amit Patel\", initials: \"AP\", route: \"Ahmedabad → Mumbai\", quote: \"\\\"The cost comparison tool helped us choose the right hospital. My mother's knee replacement went perfectly and recovery was smooth.\\\"\", treatment: \"Knee Replacement · Kokilaben Mumbai\", avatarBg: \"#DDD5E8\", avatarColor: \"#6B5B8D\" },\n    ];\n\n    return { treatments, stats, steps, packages, testimonials, costComparisons, ayushSystems, faqs };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
